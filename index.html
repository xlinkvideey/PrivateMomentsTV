body{

.container{

.loading-bar{
  height:100%;

.btn{

.video-box{

  background-size: cover;
  border-radius:12px;
  margin:15px 0;
  cursor:pointer;
  position:relative;
  height: 100vh;
  width: 100%;
  overflow:hidden;
}

.video-box video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
  
}

.label{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.45);
}

.label svg{
  width:90px;
  height:90px;
  filter:drop-shadow(0 0 15px rgba(255,215,0,.5));
  animation:pulse 1.8s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}

#overlayCTA{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.8);
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

#overlayCTA.show{
  opacity:1;
  pointer-events:auto;
}

#continueBtn{
  background:gold;
  color:#000;
  padding:14px 20px;
  border-radius:8px;
  font-weight:bold;
  opacity:0;
  transform:scale(.8);
  transition:.3s;
}

#continueBtn.show{
  opacity:1;
  transform:scale(1);
}

.tooltip{position:relative;}
.tooltip .tooltiptext{
  visibility:hidden;
  opacity:0;
  width:80px;
  color:#444;
  text-align:center;
  padding:4px;

  bottom:22px;
  border:1px solid #444;
  transition:.3s;
}
.tooltip:hover .tooltiptext{

  opacity:.8;

const ad3=atob("aHR0cHM6Ly93d3cuZWZmZWN0aXZlY3BtbmV0d29yay5jb20vYnB5aDJuM3UxP2tleT0zNjVjZDlhNTE0Nzc5OGE5ZjY2NjAxMWQ2Y2JjZDhmMA");
const ad4=atob("aHR0cHM6Ly93d3cuZWZmZWN0aXZlY3BtbmV0d29yay5jb20vcjFyZTk3ZXF2P2tleT1kOGVjM2Q3MzQ4NmM2ZjRhNDhhNGFkNzc2ZTcxNWI2ZQ");

function getLink(type){
  return{video:ad1,movie:ad2,chat:ad3,app:ad4}[type]||ad1;
}

let isProcessing=false;

function handleClick(type){
  if(isProcessing)return;
  isProcessing=true;
  startFakeLoading(getLink(type));
}

function startFakeLoading(link){
  const bar=document.getElementById("loadingBar");
  const box=document.getElementById("loadingBox");
  const text=document.getElementById("statusText");

  box.style.display="block";
  text.innerText="Processing video...";

  let progress=0;

  const interval=setInterval(()=>{
    progress+=8;

    if(progress>=100){
      progress=100;
      clearInterval(interval);

      text.innerText="Opening...";

      setTimeout(()=>{
        window.open(link,"_blank","noopener,noreferrer");
        box.style.display="none";
        bar.style.width="0%";
        isProcessing=false;
      },500);
    }

    bar.style.width=progress+"%";
  },250);
}

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

function playVideo(box){
  if(!id||id.trim()===""){
    alert("Video not found");
    return;
  }

  const video=document.getElementById("player");
  video.src="https://cdn2.videy.co/"+id+".mp4";
  video.style.display="block";

  box.querySelector(".label").style.display="none";

  video.play().catch(()=>{});
  setTimeout(showContinueBtn,8000);

  box.onclick=null;
}

function showContinueBtn(){
  const overlay=document.getElementById("overlayCTA");
  const btn=document.getElementById("continueBtn");
  const video=document.getElementById("player");

  video.pause();
  overlay.classList.add("show");

  setTimeout(()=>btn.classList.add("show"),50);
}
</script>
